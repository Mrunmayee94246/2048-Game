<!DOCTYPE html>
<html>
<head>
    <title>2048 Ultimate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen" class="center">
    <h1>2048</h1>
    <button class="btn" onclick="startGame()">Start Game</button>
    <button class="btn" onclick="loadGame()">Resume Saved</button>
</div>

<div id="gameContainer" class="center hidden">
    <h2>Score: <span id="score">0</span></h2>
    <h3>🏆 Achievement: <span id="achievement">None</span></h3>

    <button class="btn" onclick="pauseGame()">⏸ Pause</button>

    <div id="game"></div>
</div>

<div id="overlay">
    <h2 id="message"></h2>
    <button id="restartBtn" class="btn" onclick="restart()">Restart</button>
    <button id="resumeBtn" class="btn" onclick="resume()">Resume</button>
</div>

<script src="script.js"></script>
</body>
</html>
